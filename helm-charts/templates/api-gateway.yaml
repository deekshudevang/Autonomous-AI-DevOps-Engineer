apiVersion: apps/v1
kind: Deployment
metadata:
  name: aship-api-gateway
  namespace: aship-system
  labels:
    app: aship-api-gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aship-api-gateway
  template:
    metadata:
      labels:
        app: aship-api-gateway
    spec:
      serviceAccountName: aship-agent-sa
      containers:
        - name: api-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /docs
              port: http
          readinessProbe:
            httpGet:
              path: /docs
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: aship-api-gateway
  namespace: aship-system
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    app: aship-api-gateway
