name: ASHIP CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest mypy black isort
          # pip install -r requirements.txt

      - name: Code Quality (Black, Isort, Flake8)
        run: |
          black --check .
          isort --check-only .
          flake8 .
          mypy .

      - name: Run Unit Tests
        run: |
          pytest tests/ --cov=agent_core --cov-report=xml
          
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 'latest'

      - name: Run OPA Tests
        run: opa test policy_engine/policies/

  build-and-push:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -t aship/agent-core:${{ github.sha }} .
        
      # Would push to ECR/ACR/GCR here...
